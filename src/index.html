<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TokeNER</title>
    <link rel="icon" type="image/svg+xml" href="../tokener-icon-opalescent.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&display=swap");

      /* Reset and Global Styles */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background-image: url("background.png");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center center;
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* Header Styles */
      header {
        background-color: rgba(9, 34, 68, 0.72);
        color: #fff;
        padding: 20px;
        text-align: center;
        position: relative;
        border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      }

      /* Logo Styles */
      .logo {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        height: 50px;
        width: auto;
      }

      h1 {
        margin: 0;
        font-size: 2em;
        font-family: "Orbitron", "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
      }

      /* Container Layout */
      .container {
        display: flex;
        flex: 1;
        padding: 20px;
        gap: 20px;
        min-height: 0;
      }

      /* Left Sidebar: Notes List */
      .sidebar-left {
        width: 25%;
        background-color: rgba(18, 44, 74, 0.62);
        color: #fff;
        padding: 15px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(6px);
        display: flex;
        flex-direction: column;
      }

      .sidebar-left h2 {
        margin-bottom: 15px;
        text-align: center;
        color: #fff;
      }

      .file-input {
        margin-bottom: 20px;
        text-align: center;
      }

      .file-input input[type="file"] {
        display: none;
      }

      .file-input label {
        background-color: #8bd9e2;
        color: #fff;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
        display: inline-block;
        margin: 0 5px 10px;
      }

      .file-input label:hover {
        background-color: #74cbd6;
      }

      .drop-zone {
        border: 2px dashed rgba(139, 217, 226, 0.8);
        border-radius: 8px;
        padding: 12px;
        color: #dff8fb;
        font-size: 13px;
        line-height: 1.4;
        transition: background-color 0.2s, border-color 0.2s;
      }

      .drop-zone.drag-over {
        background-color: rgba(139, 217, 226, 0.2);
        border-color: #8bd9e2;
      }

      .note-list {
        list-style: none;
        padding: 0;
        overflow-y: auto;
        flex: 1;
        min-height: 0;
        padding-right: 4px;
      }

      .note-list li {
        padding: 10px;
        margin-bottom: 10px;
        background-color: rgba(255, 255, 255, 0.14);
        border-radius: 5px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background-color 0.3s;
      }

      .note-list li:hover {
        background-color: rgba(255, 255, 255, 0.24);
      }

      .note-list li.active {
        background: linear-gradient(
          120deg,
          rgba(170, 226, 255, 0.95) 0%,
          rgba(202, 190, 255, 0.95) 48%,
          rgba(255, 206, 238, 0.95) 100%
        );
        color: #1f2f4a;
        border: 1px solid rgba(255, 255, 255, 0.65);
        box-shadow: 0 4px 12px rgba(133, 157, 210, 0.28);
      }

      .note-list li.annotated::after {
        content: "✔";
        color: #7dd3fc;
        font-weight: bold;
        margin-left: 10px;
        text-shadow: 0 0 6px rgba(125, 211, 252, 0.8);
      }

      /* Main Content Area */
      .main-content {
        flex: 2;
        background-color: rgba(248, 252, 255, 0.74);
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(4px);
        min-height: 0;
        min-width: 0;
      }

      .row-indicator {
        margin-bottom: 10px;
        font-weight: bold;
        color: #5e4b8a;
        background-color: rgba(233, 220, 255, 0.8);
        border: 1px solid rgba(171, 145, 214, 0.45);
        border-radius: 8px;
        padding: 10px 12px;
      }

      /* Navigation Buttons */
      .navigation-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
      }

      .navigation-buttons button {
        flex: 1;
        padding: 10px;
        background-color: #2f74bd;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
        font-size: 16px;
      }

      .navigation-buttons button:disabled {
        background-color: #7a8696;
        cursor: not-allowed;
      }

      .navigation-buttons button:hover:not(:disabled) {
        background-color: #265d99;
      }

      #text-display {
        flex: 1;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        overflow-y: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        font-family: "Courier New", Courier, monospace;
        position: relative;
        background-color: #ffffff;
        min-height: 0;
      }

      /* Highlight Class */
      #text-display .highlight {
        padding: 2px 4px;
        border-radius: 3px;
        cursor: pointer;
        opacity: 0.7;
        display: inline;
        position: relative;
      }

      /* Annotation Toolbar */
      .annotation-toolbar {
        margin-top: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        max-height: 120px;
        overflow-y: auto;
        overflow-x: visible;
        padding-top: 10px;
        padding-left: 6px;
        align-content: flex-start;
        padding-right: 4px;
        position: relative;
        z-index: 3;
      }

      .annotation-toolbar .label-container {
        position: relative;
        display: inline-block;
        overflow: visible;
      }

      .annotation-toolbar .remove-label {
        position: absolute;
        top: -5px;
        right: -5px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        text-align: center;
        line-height: 14px;
        font-size: 12px;
        cursor: pointer;
        z-index: 2;
      }

      .annotation-toolbar button.label-button {
        padding: 8px 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        color: #fff;
        transition: transform 0.18s ease, box-shadow 0.22s ease,
          filter 0.22s ease;
        font-size: 14px;
        position: relative;
        z-index: 1;
      }

      .annotation-toolbar button.label-button:hover {
        transform: translateY(-1px);
      }

      .annotation-toolbar button.label-button.selected {
        transform: translateY(-1px);
        box-shadow: 0 0 0 2px #ffffff, 0 8px 18px rgba(12, 26, 44, 0.35);
        filter: saturate(1.2) brightness(1.05);
      }

      .annotation-toolbar button.label-button.selected::after {
        content: "ACTIVE";
        position: absolute;
        top: 3px;
        right: 4px;
        font-size: 8px;
        letter-spacing: 0.06em;
        font-weight: 700;
        color: #0e2034;
        background: #ffffff;
        border-radius: 999px;
        padding: 1px 5px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        z-index: 4;
      }

      /* Predefined Labels */
      .ADDRESS {
        background-color: #ffd166;
      }

      .AGE {
        background-color: #6f9bff;
      }

      .CREDIT_CARD {
        background-color: #ff7f66;
      }

      .DATE {
        background-color: #f7a64a;
      }

      .EMAIL {
        background-color: #22c7b8;
      }

      .GPS {
        background-color: #39d98a;
      }

      .HOSPITAL {
        background-color: #8bcf95;
      }

      .IBAN {
        background-color: #1ecbb4;
      }

      .IP {
        background-color: #4da3ff;
      }

      .JOB {
        background-color: #9a7bff;
      }

      .LICENSE_PLATE {
        background-color: #c9996b;
      }

      .MAC {
        background-color: #57b9ba;
      }

      .NAME {
        background-color: #ff8a4c;
      }

      .ORG {
        background-color: #7d93c8;
      }

      .PATIENT_ID {
        background-color: #8f6de8;
      }

      .PHONE {
        background-color: #3aa6cc;
      }

      .SEX {
        background-color: #d785d3;
      }

      .SSN {
        background-color: #ff6f91;
      }

      .URL {
        background-color: #3f8cff;
      }

      .ADDRESS,
      .HOSPITAL {
        color: #1d2a35;
      }

      /* Right Sidebar: Annotations List and Add Label */
      .sidebar-right {
        width: 25%;
        background-color: rgba(18, 44, 74, 0.62);
        color: #fff;
        padding: 15px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        overflow: visible;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(6px);
      }

      .label-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 0;
        flex-wrap: nowrap;
      }

      .label-header-main {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        height: 24px;
      }

      .label-section-header h2 {
        margin: 0;
        text-align: left;
        font-size: 14px;
        line-height: 1;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        height: 24px;
        color: #ffffff;
      }

      #label-search {
        width: 135px;
        max-width: 38vw;
        padding: 0 6px 0 24px;
        height: 24px;
        line-height: 24px;
        border: 1px solid rgba(203, 222, 247, 0.9);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.95);
        color: #243447;
        font-size: 11px;
      }

      .label-search-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .label-search-wrap .fa-magnifying-glass {
        position: absolute;
        left: 8px;
        font-size: 10px;
        color: #6b7a8c;
        pointer-events: none;
      }

      #label-search::placeholder {
        color: #6b7a8c;
      }

      .label-section-header p {
        margin: 0;
        font-size: 11px;
        line-height: 1;
        color: #d6e7ff;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        height: 24px;
      }

      #active-label-name {
        color: #ffffff;
        font-weight: 700;
      }

      /* Add Label Section */
      #add-label-container {
        background-color: #fff;
        color: #333;
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 8px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      #add-label-container h2 {
        margin-bottom: 8px;
        font-size: 14px;
        color: #333;
      }

      /* Flexbox for Inputs */
      .add-label-inputs {
        width: 100%;
      }

      .add-label-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      #add-label-container input[type="text"] {
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 52%;
        min-width: 170px;
        font-size: 13px;
      }

      /* Enhanced Color Selector Styling */
      #add-label-container .color-input-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        flex-wrap: nowrap;
      }

      #add-label-container input[type="color"] {
        border: none;
        width: 30px;
        height: 30px;
        cursor: pointer;
        border-radius: 4px;
      }

      /* Add Label Button */
      #add-label-container .color-input-wrapper button {
        padding: 6px 10px;
        background-color: #2d8fa0;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
        font-size: 12px;
      }

      #add-label-container .color-input-wrapper button:hover {
        background-color: #257a8a;
      }

      /* Annotations List */
      #annotations-section {
        flex: 1;
        background-color: #ffffff;
        color: #333;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
        min-height: 0;
      }

      #annotations-section h2 {
        margin-bottom: 10px;
        text-align: center;
        color: #333;
      }

      .annotation {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #eef5fb;
        padding: 8px;
        border-radius: 5px;
        margin-bottom: 10px;
        box-shadow: 0 0 3px rgba(0, 0, 0, 0.1);
      }

      .annotation span {
        flex: 1;
        margin-right: 10px;
        font-size: 14px;
        word-break: break-all;
      }

      .annotation button {
        padding: 5px 10px;
        background-color: #dc3545;
        color: #fff;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        transition: background-color 0.3s;
        font-size: 12px;
      }

      .annotation button:hover {
        background-color: #c82333;
      }

      /* Download Button */
      .download-btn {
        margin-top: 20px;
        padding: 12px 0;
        background-color: #2d8fa0;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s;
        text-align: center;
      }

      .download-btn:disabled {
        background-color: #6c757d;
        cursor: not-allowed;
      }

      .download-btn:hover:not(:disabled) {
        background-color: #257a8a;
      }

      /* New Styles for Filename Input */
      #filename-container {
        text-align: center;
        margin: 10px 0;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        align-items: center;
      }

      #filename-input {
        padding: 8px;
        width: 60%;
        max-width: 300px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      #export-format {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
      }

      /* Scrollbar Styling */
      .note-list::-webkit-scrollbar,
      .annotation-toolbar::-webkit-scrollbar,
      #annotations-section::-webkit-scrollbar,
      .main-content::-webkit-scrollbar {
        width: 8px;
      }

      .note-list::-webkit-scrollbar-track,
      .annotation-toolbar::-webkit-scrollbar-track,
      #annotations-section::-webkit-scrollbar-track,
      .main-content::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }

      .note-list::-webkit-scrollbar-thumb,
      .annotation-toolbar::-webkit-scrollbar-thumb,
      #annotations-section::-webkit-scrollbar-thumb,
      .main-content::-webkit-scrollbar-thumb {
        background: #9fb3c9;
        border-radius: 4px;
      }

      .note-list::-webkit-scrollbar-thumb:hover,
      .annotation-toolbar::-webkit-scrollbar-thumb:hover,
      #annotations-section::-webkit-scrollbar-thumb:hover,
      .main-content::-webkit-scrollbar-thumb:hover {
        background: #879cb4;
      }

      /* Responsive Design */
      @media (max-width: 1200px) {
        .container {
          flex-direction: column;
        }

        .sidebar-left,
        .sidebar-right,
        .main-content {
          width: 100%;
          height: auto;
        }

        /* Adjust logo position for smaller screens */
        .logo {
          position: static;
          transform: none;
          margin-bottom: 10px;
        }

        header {
          text-align: center;
        }
      }

      @media (max-width: 768px) {
        .annotation-toolbar {
          flex-direction: column;
          margin-bottom: 10px;
        }

        .annotation-toolbar button {
          width: 100%;
        }

        .add-label-inputs {
          width: 100%;
        }

        .add-label-row {
          flex-wrap: wrap;
        }

        #add-label-container input[type="text"] {
          width: 100%;
          min-width: 0;
        }

        /* Adjust button size on smaller screens */
        #add-label-container .color-input-wrapper button {
          padding: 6px 10px;
          font-size: 12px;
        }
      }

      /* Additional Styles for Overlapping Annotations */
      #text-display {
        position: relative;
      }

      #text-display .highlight {
        position: relative;
        display: inline;
      }

      /* Footer Styles */
      footer {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 5px;
        padding: 10px 20px;
        background-color: rgba(9, 34, 68, 0.72);
        color: #fff;
        font-size: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.25);
      }
    </style>
  </head>
  <body>
    <!-- Header with Logo -->
    <header>
      <img
        src="../tokener-icon-opalescent.svg"
        alt="TokeNER Logo"
        class="logo"
      />
      <h1>TokeNER</h1>
    </header>

    <div class="container">
      <!-- Left Sidebar: Notes List -->
      <div class="sidebar-left">
        <h2>Notes</h2>
        <div class="file-input">
          <input type="file" id="fileInput" accept=".csv, .txt" multiple />
          <input
            type="file"
            id="directoryInput"
            webkitdirectory
            directory
            multiple
            accept=".csv,.txt"
          />
          <label for="fileInput">Choose File</label>
          <label for="directoryInput">Choose Folder</label>
          <div class="drop-zone" id="dropZone">
            Drag and drop CSV/TXT files or folders here
          </div>
        </div>
        <ul id="noteList" class="note-list"></ul>
      </div>

      <!-- Main Content Area: Note Display -->
      <div class="main-content">
        <div class="row-indicator" id="rowIndicator">
          Select a note to begin
        </div>
        <div class="navigation-buttons">
          <button id="prevBtn" disabled>Previous</button>
          <button id="nextBtn" disabled>Next</button>
        </div>
        <div id="text-display">No note selected.</div>

        <!-- New Filename Input Container -->
        <div id="filename-container">
          <input
            type="text"
            id="filename-input"
            placeholder="Enter filename (e.g., my_annotations.json)"
          />
          <select id="export-format" aria-label="Export format">
            <option value="spans">Span JSON</option>
            <option value="bio">BIO JSON</option>
          </select>
        </div>

        <button id="downloadBtn" class="download-btn" disabled>
          Download Annotations (JSON)
        </button>
      </div>

      <!-- Right Sidebar: Annotations and Add Label -->
      <div class="sidebar-right">
        <div class="label-section-header">
          <div class="label-header-main">
            <h2>Labels</h2>
            <div class="label-search-wrap">
              <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
              <input
                type="text"
                id="label-search"
                placeholder="Search labels"
                aria-label="Search labels"
              />
            </div>
          </div>
          <p>Active: <span id="active-label-name">None</span></p>
        </div>

        <!-- Annotation Toolbar (Label List) -->
        <div class="annotation-toolbar" id="annotationToolbar">
          <button class="label-button ADDRESS">ADDRESS</button>
          <button class="label-button AGE">AGE</button>
          <button class="label-button CREDIT_CARD">CREDIT_CARD</button>
          <button class="label-button DATE">DATE</button>
          <button class="label-button EMAIL">EMAIL</button>
          <button class="label-button GPS">GPS</button>
          <button class="label-button HOSPITAL">HOSPITAL</button>
          <button class="label-button IBAN">IBAN</button>
          <button class="label-button IP">IP</button>
          <button class="label-button JOB">JOB</button>
          <button class="label-button LICENSE_PLATE">LICENSE_PLATE</button>
          <button class="label-button MAC">MAC</button>
          <button class="label-button NAME">NAME</button>
          <button class="label-button ORG">ORG</button>
          <button class="label-button PATIENT_ID">PATIENT_ID</button>
          <button class="label-button PHONE">PHONE</button>
          <button class="label-button SEX">SEX</button>
          <button class="label-button SSN">SSN</button>
          <button class="label-button URL">URL</button>
          <!-- Custom labels will be appended here -->
        </div>

        <!-- Add Label Section -->
        <div id="add-label-container">
          <h2>Add Custom Label</h2>
          <div class="add-label-inputs">
            <div class="add-label-row">
              <input
                type="text"
                id="custom-label-name"
                placeholder="Label Name"
              />
              <div class="color-input-wrapper">
                <label for="custom-label-color" style="font-size: 12px"
                  >Color:</label
                >
                <input type="color" id="custom-label-color" value="#888888" />
                <button id="add-label-button">Add Label</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Annotations List -->
        <div id="annotations-section">
          <h2>Annotations</h2>
          <div id="annotations">
            <p>No annotations for this note.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <span>&copy; 2026</span>
      <a
        href="https://xtasis.com"
        target="_blank"
        style="color: #fff; text-decoration: underline"
        >Xtasis Inc.</a
      >
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- JavaScript -->
    <script>
      // DOM Elements
      const fileInput = document.getElementById("fileInput");
      const directoryInput = document.getElementById("directoryInput");
      const dropZone = document.getElementById("dropZone");
      const noteList = document.getElementById("noteList");
      const rowIndicator = document.getElementById("rowIndicator");
      const textDisplay = document.getElementById("text-display");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const annotationToolbar = document.getElementById("annotationToolbar");
      const addLabelButton = document.getElementById("add-label-button");
      const customLabelName = document.getElementById("custom-label-name");
      const customLabelColor = document.getElementById("custom-label-color");
      const annotationsDiv = document.getElementById("annotations");
      const filenameInput = document.getElementById("filename-input"); // New Element
      const exportFormat = document.getElementById("export-format");
      const activeLabelName = document.getElementById("active-label-name");
      const labelSearchInput = document.getElementById("label-search");

      // Data Structures
      let originalNotes = [];
      let notes = [];
      let noteTitles = [];
      let annotations = {};
      let currentIndex = -1;
      let customLabels = {};
      let activeLabel = null;
      const ANNOTATION_PREVIEW_MAX_LENGTH = 60;

      // Utility Functions
      function getContrastYIQ(hexcolor) {
        hexcolor = hexcolor.replace("#", "");
        let r, g, b;
        if (hexcolor.length === 3) {
          r = parseInt(hexcolor[0] + hexcolor[0], 16);
          g = parseInt(hexcolor[1] + hexcolor[1], 16);
          b = parseInt(hexcolor[2] + hexcolor[2], 16);
        } else {
          r = parseInt(hexcolor.substr(0, 2), 16);
          g = parseInt(hexcolor.substr(2, 2), 16);
          b = parseInt(hexcolor.substr(4, 2), 16);
        }
        const yiq = (r * 299 + g * 587 + b * 114) / 1000;
        return yiq >= 128 ? "#000" : "#fff";
      }

      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.replace(/[&<>"']/g, function (m) {
          return map[m];
        });
      }

      function isSupportedFile(file) {
        const fileName = file.name.toLowerCase();
        return (
          file.type === "text/csv" ||
          file.type === "text/plain" ||
          fileName.endsWith(".csv") ||
          fileName.endsWith(".txt")
        );
      }

      function readFileContent(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = () => reject(new Error(`Failed to read ${file.name}`));
          reader.readAsText(file);
        });
      }

      function getNoteTitleFromFile(file) {
        return file && file.name ? file.name : "Untitled note";
      }

      async function handleSelectedFiles(fileList) {
        const allFiles = Array.from(fileList || []);
        const supportedFiles = allFiles.filter((file) => isSupportedFile(file));

        if (supportedFiles.length === 0) {
          alert("No valid CSV or TXT files were provided.");
          return;
        }

        resetData();

        for (const file of supportedFiles) {
          try {
            const content = await readFileContent(file);
            const fileName = file.name.toLowerCase();
            const title = getNoteTitleFromFile(file);

            if (fileName.endsWith(".csv")) {
              const lines = content
                .split(/\r\n|\n/)
                .filter((line) => line.trim() !== "");
              lines.forEach((line) => {
                originalNotes.push(line);
                notes.push(line);
                noteTitles.push(title);
              });
            } else {
              const cleanedText = content.trim();
              if (cleanedText.length > 0) {
                originalNotes.push(cleanedText);
                notes.push(cleanedText);
                noteTitles.push(title);
              }
            }
          } catch (error) {
            console.error(error);
          }
        }

        if (notes.length > 0) {
          displayNotes();
        } else {
          alert("No readable content found in the selected files.");
        }
      }

      function tokenizeWithOffsets(text) {
        const tokens = [];
        const tokenRegex = /\S+/g;
        let match;

        while ((match = tokenRegex.exec(text)) !== null) {
          tokens.push({
            token: match[0],
            start_idx: match.index,
            end_idx: match.index + match[0].length,
          });
        }

        return tokens;
      }

      function createBioForNote(noteText, noteAnnotations) {
        const tokens = tokenizeWithOffsets(noteText);
        const tags = Array(tokens.length).fill("O");

        if (!noteAnnotations || noteAnnotations.length === 0 || tokens.length === 0) {
          return {
            text: noteText,
            tokens,
            tags,
            sequence: tokens.map((tokenObj, idx) => ({
              token: tokenObj.token,
              tag: tags[idx],
              start_idx: tokenObj.start_idx,
              end_idx: tokenObj.end_idx,
            })),
          };
        }

        const sortedAnnotations = [...noteAnnotations].sort((a, b) => {
          const lenA = a.end_idx - a.start_idx;
          const lenB = b.end_idx - b.start_idx;
          if (lenA !== lenB) return lenB - lenA;
          return a.start_idx - b.start_idx;
        });

        sortedAnnotations.forEach((ann) => {
          const overlappingTokenIdxs = [];

          for (let i = 0; i < tokens.length; i++) {
            const token = tokens[i];
            const overlaps = token.start_idx < ann.end_idx && token.end_idx > ann.start_idx;
            if (overlaps) {
              overlappingTokenIdxs.push(i);
            }
          }

          const unassignedIdxs = overlappingTokenIdxs.filter((idx) => tags[idx] === "O");
          if (unassignedIdxs.length === 0) {
            return;
          }

          tags[unassignedIdxs[0]] = `B-${ann.label}`;
          for (let i = 1; i < unassignedIdxs.length; i++) {
            tags[unassignedIdxs[i]] = `I-${ann.label}`;
          }
        });

        return {
          text: noteText,
          tokens,
          tags,
          sequence: tokens.map((tokenObj, idx) => ({
            token: tokenObj.token,
            tag: tags[idx],
            start_idx: tokenObj.start_idx,
            end_idx: tokenObj.end_idx,
          })),
        };
      }

      function normalizeFilename(name, defaultBase, extension) {
        const trimmed = (name || "").trim();
        const safeBase = trimmed.replace(/\.(json|zip)$/i, "") || defaultBase;
        return `${safeBase}${extension}`;
      }

      function getLabelColor(label) {
        return predefinedLabels[label] || customLabels[label] || null;
      }

      function setActiveLabel(label) {
        activeLabel = label;
        annotationToolbar.querySelectorAll(".label-button").forEach((button) => {
          button.classList.toggle("selected", button.textContent === label);
        });

        if (activeLabelName) {
          activeLabelName.textContent = label || "None";
        }
      }

      function filterLabelButtons(rawQuery) {
        const query = (rawQuery || "").trim().toLowerCase();

        Array.from(annotationToolbar.children).forEach((child) => {
          let button = null;

          if (child.classList.contains("label-container")) {
            button = child.querySelector(".label-button");
          } else if (child.classList.contains("label-button")) {
            button = child;
          }

          if (!button) return;

          const labelText = button.textContent.toLowerCase();
          const isMatch = labelText.includes(query);
          child.style.display = isMatch ? "" : "none";
        });
      }

      function isRangeInsideTextDisplay(range) {
        let node = range.commonAncestorContainer;
        if (node.nodeType === Node.TEXT_NODE) {
          node = node.parentNode;
        }
        return textDisplay.contains(node);
      }

      function applyLabelToCurrentSelection(label, options = {}) {
        const { silent = false } = options;

        if (currentIndex < 0 || !notes[currentIndex]) {
          if (!silent) alert("Please select a note before assigning a label.");
          return false;
        }

        const color = getLabelColor(label);
        if (!color) {
          if (!silent) alert("Label color not found.");
          return false;
        }

        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) {
          if (!silent) alert("Please highlight text before assigning a label.");
          return false;
        }

        const range = selection.getRangeAt(0);
        if (!isRangeInsideTextDisplay(range)) {
          if (!silent) alert("Please highlight text inside the note area.");
          return false;
        }

        const selectedText = selection.toString();
        if (!selectedText.trim()) {
          if (!silent) alert("Please highlight text before assigning a label.");
          return false;
        }

        const { start, end } = getSelectionIndices(range);
        if (!(start >= 0 && end <= notes[currentIndex].length && start < end)) {
          if (!silent) alert("Invalid selection range. Please try again.");
          return false;
        }

        const annotation = {
          label,
          color,
          start_idx: start,
          end_idx: end,
          text: notes[currentIndex].substring(start, end),
        };

        if (!annotations[currentIndex]) {
          annotations[currentIndex] = [];
        }

        insertAnnotationSorted(currentIndex, annotation);
        renderAnnotations();
        renderText();

        const li = noteList.querySelector(`li[data-index='${currentIndex}']`);
        if (li) {
          li.classList.add("annotated");
        }

        selection.removeAllRanges();
        downloadBtn.disabled = false;
        return true;
      }

      // File Upload Handler
      fileInput.addEventListener("change", function (event) {
        handleSelectedFiles(event.target.files);
        fileInput.value = "";
      });

      directoryInput.addEventListener("change", function (event) {
        handleSelectedFiles(event.target.files);
        directoryInput.value = "";
      });

      dropZone.addEventListener("dragover", function (event) {
        event.preventDefault();
        dropZone.classList.add("drag-over");
      });

      dropZone.addEventListener("dragleave", function () {
        dropZone.classList.remove("drag-over");
      });

      dropZone.addEventListener("drop", function (event) {
        event.preventDefault();
        dropZone.classList.remove("drag-over");
        handleSelectedFiles(event.dataTransfer.files);
      });

      // Parse CSV File
      function parseCSV(data) {
        resetData();

        const lines = data
          .split(/\r\n|\n/)
          .filter((line) => line.trim() !== "");
        lines.forEach((line) => {
          originalNotes.push(line);
          notes.push(line);
        });

        if (notes.length > 0) {
          displayNotes();
        } else {
          alert("The CSV file is empty.");
        }
      }

      // Parse Text File
      function parseText(data) {
        resetData();
        const cleanedText = data.trim();
        if (cleanedText.length > 0) {
          originalNotes.push(cleanedText);
          notes.push(cleanedText);
          displayNotes();
        } else {
          alert("The Text file is empty.");
        }
      }

      // Reset Data
      function resetData() {
        originalNotes = [];
        notes = [];
        noteTitles = [];
        annotations = {};
        currentIndex = -1;
        textDisplay.innerHTML = "No note selected.";
        rowIndicator.textContent = "Select a note to begin";
        noteList.innerHTML = "";
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        downloadBtn.disabled = true;
        filenameInput.value = ""; // Reset filename input
      }

      // Display Notes in Sidebar
      function displayNotes() {
        noteList.innerHTML = "";
        notes.forEach((note, index) => {
          const li = document.createElement("li");
          li.textContent = noteTitles[index] || `Note ${index + 1}`;
          li.dataset.index = index;

          // Add 'annotated' class if annotations exist
          if (annotations[index] && annotations[index].length > 0) {
            li.classList.add("annotated");
          }

          // Click Event to Select Note
          li.addEventListener("click", () => selectNote(index));
          noteList.appendChild(li);
        });
      }

      // Truncate Text Helper
      function truncateText(text, maxLength) {
        return text.length > maxLength
          ? text.substring(0, maxLength) + "..."
          : text;
      }

      // Select a Note
      function selectNote(index) {
        currentIndex = index;
        rowIndicator.textContent = `Note ${currentIndex + 1} of ${
          notes.length
        }`;
        highlightActiveNote();
        renderAnnotations();
        renderText();
        updateNavigationButtons();
        downloadBtn.disabled = !(
          annotations[currentIndex] && annotations[currentIndex].length > 0
        );
      }

      // Highlight Active Note in Sidebar
      function highlightActiveNote() {
        Array.from(noteList.children).forEach((li) => {
          li.classList.remove("active");
          if (parseInt(li.dataset.index) === currentIndex) {
            li.classList.add("active");
          }
        });
      }

      // Update Navigation Buttons
      function updateNavigationButtons() {
        prevBtn.disabled = currentIndex <= 0;
        nextBtn.disabled = currentIndex >= notes.length - 1;
      }

      // Predefined Labels and Their Colors
      const predefinedLabels = {
        ADDRESS: "#ffd166",
        AGE: "#6f9bff",
        CREDIT_CARD: "#ff7f66",
        DATE: "#f7a64a",
        EMAIL: "#22c7b8",
        GPS: "#39d98a",
        HOSPITAL: "#8bcf95",
        IBAN: "#1ecbb4",
        IP: "#4da3ff",
        JOB: "#9a7bff",
        LICENSE_PLATE: "#c9996b",
        MAC: "#57b9ba",
        NAME: "#ff8a4c",
        ORG: "#7d93c8",
        PATIENT_ID: "#8f6de8",
        PHONE: "#3aa6cc",
        SEX: "#d785d3",
        SSN: "#ff6f91",
        URL: "#3f8cff",
      };

      // Insert Annotation in Sorted Order with Merging
      function insertAnnotationSorted(noteIndex, newAnn) {
        const annArray = annotations[noteIndex];
        const sameLabelAnns = annArray.filter(
          (ann) => ann.label === newAnn.label
        );

        // Find annotations to merge (overlapping or adjacent)
        const overlappingAnns = sameLabelAnns.filter(
          (ann) =>
            !(
              newAnn.end_idx < ann.start_idx - 1 ||
              newAnn.start_idx > ann.end_idx + 1
            )
        );

        if (overlappingAnns.length > 0) {
          // Determine the merged range
          const mergedStart = Math.min(
            newAnn.start_idx,
            ...overlappingAnns.map((ann) => ann.start_idx)
          );
          const mergedEnd = Math.max(
            newAnn.end_idx,
            ...overlappingAnns.map((ann) => ann.end_idx)
          );

          // Remove the overlapping annotations
          annotations[noteIndex] = annArray.filter(
            (ann) =>
              !(
                ann.label === newAnn.label &&
                !(
                  newAnn.end_idx < ann.start_idx - 1 ||
                  newAnn.start_idx > ann.end_idx + 1
                )
              )
          );

          // Create the merged annotation
          const mergedAnnotation = {
            label: newAnn.label,
            color: newAnn.color,
            start_idx: mergedStart,
            end_idx: mergedEnd,
            text: notes[noteIndex].substring(mergedStart, mergedEnd),
          };

          // Insert the merged annotation in sorted order
          let inserted = false;
          for (let i = 0; i < annotations[noteIndex].length; i++) {
            if (
              mergedAnnotation.start_idx < annotations[noteIndex][i].start_idx
            ) {
              annotations[noteIndex].splice(i, 0, mergedAnnotation);
              inserted = true;
              break;
            }
          }
          if (!inserted) {
            annotations[noteIndex].push(mergedAnnotation);
          }
        } else {
          // No overlapping annotations, insert normally
          let inserted = false;
          for (let i = 0; i < annArray.length; i++) {
            if (newAnn.start_idx < annArray[i].start_idx) {
              annArray.splice(i, 0, newAnn);
              inserted = true;
              break;
            }
          }
          if (!inserted) {
            annArray.push(newAnn);
          }
        }
      }

      // Handle Label Assignment and Removal via Annotation Toolbar
      annotationToolbar.addEventListener("click", function (event) {
        // Handle label assignment
        if (event.target.classList.contains("label-button")) {
          const label = event.target.textContent;
          setActiveLabel(label);
          applyLabelToCurrentSelection(label, { silent: true });
        }

        // Handle label removal
        if (event.target.classList.contains("remove-label")) {
          const labelContainer = event.target.parentElement;
          const labelButton = labelContainer.querySelector(".label-button");
          const labelName = labelButton.textContent;

          // Confirm removal
          const confirmRemoval = confirm(
            `Are you sure you want to remove the custom label "${labelName}"?`
          );
          if (!confirmRemoval) return;

          // Remove from customLabels
          delete customLabels[labelName];

          if (activeLabel === labelName) {
            setActiveLabel(null);
          }

          // Remove the label container from the toolbar
          labelContainer.remove();

          // Optionally, remove annotations using this label
          /*
          for (let noteIdx in annotations) {
            annotations[noteIdx] = annotations[noteIdx].filter(
              (ann) => ann.label !== labelName
            );
          }
          renderAnnotations();
          renderText();
          */
        }
      });

      // Handle Adding Custom Labels
      addLabelButton.addEventListener("click", () => {
        const labelName = customLabelName.value.trim();
        const labelColor = customLabelColor.value;

        if (!labelName) {
          alert("Please enter a label name.");
          return;
        }

        if (predefinedLabels[labelName] || customLabels[labelName]) {
          alert("Label already exists.");
          return;
        }

        // Add to customLabels
        customLabels[labelName] = labelColor;

        // Create new label container with 'remove-label' span
        const labelContainer = document.createElement("div");
        labelContainer.classList.add("label-container");

        const button = document.createElement("button");
        button.classList.add("label-button");
        button.textContent = labelName;
        button.style.backgroundColor = labelColor;
        button.style.color = getContrastYIQ(labelColor);

        const removeSpan = document.createElement("span");
        removeSpan.classList.add("remove-label");
        removeSpan.textContent = "x";

        labelContainer.appendChild(button);
        labelContainer.appendChild(removeSpan);

        // Add the new label container to the toolbar
        annotationToolbar.appendChild(labelContainer);

        // Keep new labels consistent with any active search filter.
        if (labelSearchInput) {
          filterLabelButtons(labelSearchInput.value);
        }

        // Clear input fields
        customLabelName.value = "";
        customLabelColor.value = "#888888";

        // Inform the user that the label was added
        alert(`Custom label "${labelName}" added.`);
      });

      textDisplay.addEventListener("mouseup", () => {
        if (!activeLabel) return;
        applyLabelToCurrentSelection(activeLabel, { silent: true });
      });

      if (labelSearchInput) {
        labelSearchInput.addEventListener("input", (event) => {
          filterLabelButtons(event.target.value);
        });
      }

      // Get Selection Indices
      function getSelectionIndices(range) {
        const text = notes[currentIndex];
        const preSelectionRange = document.createRange();
        preSelectionRange.selectNodeContents(textDisplay);
        preSelectionRange.setEnd(range.startContainer, range.startOffset);
        const start = preSelectionRange.toString().length;
        const end = start + range.toString().length;
        return { start, end };
      }

      // Render Annotations List
      function renderAnnotations() {
        annotationsDiv.innerHTML = "";
        if (
          !annotations[currentIndex] ||
          annotations[currentIndex].length === 0
        ) {
          annotationsDiv.innerHTML = "<p>No annotations for this note.</p>";
          return;
        }

        annotations[currentIndex].forEach((annotation, index) => {
          const annotationDiv = document.createElement("div");
          annotationDiv.classList.add("annotation");

          // Annotation text and label
          const textLabelDiv = document.createElement("div");
          textLabelDiv.style.display = "inline-flex";
          textLabelDiv.style.alignItems = "center";
          textLabelDiv.style.gap = "5px";

          const textSpan = document.createElement("span");
          const previewText = truncateText(
            annotation.text,
            ANNOTATION_PREVIEW_MAX_LENGTH
          );
          textSpan.textContent = `${index + 1}. "${previewText}" (${
            annotation.start_idx
          }-${annotation.end_idx}) -`;
          textSpan.title = annotation.text;

          const labelSpan = document.createElement("span");
          labelSpan.textContent = annotation.label;
          labelSpan.style.color = annotation.color;
          labelSpan.style.fontWeight = "bold";

          textLabelDiv.appendChild(textSpan);
          textLabelDiv.appendChild(labelSpan);

          // Remove button
          const removeBtn = document.createElement("button");
          removeBtn.textContent = "Remove";
          removeBtn.setAttribute("data-note-index", currentIndex);
          removeBtn.setAttribute("data-annotation-index", index);

          annotationDiv.appendChild(textLabelDiv);
          annotationDiv.appendChild(removeBtn);
          annotationsDiv.appendChild(annotationDiv);
        });
      }

      // Event Delegation for Remove Buttons
      annotationsDiv.addEventListener("click", (event) => {
        if (
          event.target.tagName.toLowerCase() === "button" &&
          event.target.textContent === "Remove"
        ) {
          const noteIdx = parseInt(
            event.target.getAttribute("data-note-index")
          );
          const annIdx = parseInt(
            event.target.getAttribute("data-annotation-index")
          );
          removeAnnotation(noteIdx, annIdx);
        }
      });

      // Remove Annotation Function
      function removeAnnotation(noteIndex, annotationIndex) {
        if (
          annotations[noteIndex] &&
          annotations[noteIndex].length > annotationIndex
        ) {
          annotations[noteIndex].splice(annotationIndex, 1);
          renderAnnotations();
          renderText();

          // Update sidebar checkmark
          const li = noteList.querySelector(`li[data-index='${noteIndex}']`);
          if (li) {
            if (
              !annotations[noteIndex] ||
              annotations[noteIndex].length === 0
            ) {
              li.classList.remove("annotated");
            }
          }

          // Disable download button if no annotations left for current note
          if (noteIndex === currentIndex) {
            downloadBtn.disabled = !(
              annotations[currentIndex] && annotations[currentIndex].length > 0
            );
          }
        } else {
          alert("Invalid annotation index.");
        }
      }

      // Render Text with Highlights
      function renderText() {
        const text = notes[currentIndex];
        if (!text) {
          textDisplay.innerHTML = "No note selected.";
          return;
        }

        if (
          !annotations[currentIndex] ||
          annotations[currentIndex].length === 0
        ) {
          textDisplay.innerHTML = escapeHtml(text);
          return;
        }

        // Use the already sorted annotations
        const sortedAnnotations = annotations[currentIndex];

        // Create an array of all annotation boundaries
        let boundaries = [];
        sortedAnnotations.forEach((ann) => {
          boundaries.push({ index: ann.start_idx, type: "start", ann });
          boundaries.push({ index: ann.end_idx, type: "end", ann });
        });

        // Sort boundaries
        boundaries.sort((a, b) => {
          if (a.index !== b.index) return a.index - b.index;
          // End boundaries should come before start boundaries at the same index
          if (a.type === "end" && b.type === "start") return -1;
          if (a.type === "start" && b.type === "end") return 1;
          return 0;
        });

        let result = "";
        let activeAnnotations = [];
        let lastIndex = 0;

        boundaries.forEach((boundary) => {
          const { index, type, ann } = boundary;

          if (index > lastIndex) {
            const segment = escapeHtml(text.slice(lastIndex, index));

            if (activeAnnotations.length === 0) {
              result += segment;
            } else {
              // Apply all active annotations
              let nestedSegment = segment;
              activeAnnotations.forEach((activeAnn) => {
                nestedSegment = `<span class="highlight" style="background-color: ${
                  activeAnn.color
                }; color: ${getContrastYIQ(
                  activeAnn.color
                )};" title="${escapeHtml(
                  activeAnn.label
                )}">${nestedSegment}</span>`;
              });
              result += nestedSegment;
            }

            lastIndex = index;
          }

          if (type === "start") {
            activeAnnotations.push(ann);
          } else if (type === "end") {
            // Remove the annotation from activeAnnotations
            activeAnnotations = activeAnnotations.filter((a) => a !== ann);
          }
        });

        // Append any remaining text after the last boundary
        if (lastIndex < text.length) {
          const segment = escapeHtml(text.slice(lastIndex));

          if (activeAnnotations.length === 0) {
            result += segment;
          } else {
            let nestedSegment = segment;
            activeAnnotations.forEach((activeAnn) => {
              nestedSegment = `<span class="highlight" style="background-color: ${
                activeAnn.color
              }; color: ${getContrastYIQ(
                activeAnn.color
              )};" title="${escapeHtml(
                activeAnn.label
              )}">${nestedSegment}</span>`;
            });
            result += nestedSegment;
          }
        }

        textDisplay.innerHTML = result;
      }

      // Handle Download Annotations
      downloadBtn.addEventListener("click", async () => {
        // Get the filename from the input
        const requestedFilename = filenameInput.value.trim();
        const format = exportFormat.value;

        // Filter notes with annotations
        const annotationsData = originalNotes
          .map((note, index) => ({
            note_index: index,
            note: notes[index],
            annotations: annotations[index] || [],
          }))
          .filter((entry) => entry.annotations.length > 0); // Keep only notes with annotations

        if (annotationsData.length === 0) {
          alert("No annotated notes to download.");
          return;
        }

        if (annotationsData.length > 1) {
          if (typeof JSZip === "undefined") {
            alert("ZIP export is unavailable because JSZip did not load.");
            return;
          }

          const zip = new JSZip();

          annotationsData.forEach((entry) => {
            const fileName = `note_${entry.note_index + 1}.json`;

            let filePayload;
            if (format === "bio") {
              filePayload = {
                format: "BIO",
                scheme: "BIO",
                overlap_policy: "longest_first_non_overwriting",
                note_index: entry.note_index,
                ...createBioForNote(entry.note, entry.annotations),
              };
            } else {
              filePayload = {
                format: "SPAN",
                note_index: entry.note_index,
                note: entry.note,
                annotations: entry.annotations,
              };
            }

            zip.file(fileName, JSON.stringify(filePayload, null, 2));
          });

          const zipBlob = await zip.generateAsync({ type: "blob" });
          const zipFilename = normalizeFilename(
            requestedFilename,
            format === "bio" ? "annotations_bio" : "annotations",
            ".zip"
          );

          const zipUrl = URL.createObjectURL(zipBlob);
          const zipLink = document.createElement("a");
          zipLink.href = zipUrl;
          zipLink.download = zipFilename;
          document.body.appendChild(zipLink);
          zipLink.click();
          document.body.removeChild(zipLink);
          URL.revokeObjectURL(zipUrl);
          return;
        }

        const filename = normalizeFilename(
          requestedFilename,
          format === "bio" ? "annotations_bio" : "annotations",
          ".json"
        );

        let dataToDownload;
        if (format === "bio") {
          dataToDownload = {
            format: "BIO",
            scheme: "BIO",
            overlap_policy: "longest_first_non_overwriting",
            notes: annotationsData.map((entry) => ({
              note_index: entry.note_index,
              ...createBioForNote(entry.note, entry.annotations),
            })),
          };
        } else {
          dataToDownload = {
            format: "SPAN",
            annotations: annotationsData,
          };
        }

        const blob = new Blob([JSON.stringify(dataToDownload, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename; // Use the user-defined filename
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      // Handle Navigation Buttons
      prevBtn.addEventListener("click", () => {
        if (currentIndex > 0) {
          selectNote(currentIndex - 1);
        }
      });

      nextBtn.addEventListener("click", () => {
        if (currentIndex < notes.length - 1) {
          selectNote(currentIndex + 1);
        }
      });
    </script>
  </body>
</html>
